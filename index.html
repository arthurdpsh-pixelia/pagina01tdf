<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <!-- UTMify Script -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <!-- End UTMify Script -->
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('set', 'autoConfig', false, '1432847271625128');
    fbq('init', '1432847271625128');
    fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel Code -->
  </head>
  <body>
    <!-- Meta Pixel Code (noscript) -->
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1432847271625128&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Script para forçar repasse de parâmetros UTM/URL para os próximos links -->
    <script>
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (link && link.href && window.location.search) {
          var hrefAttr = link.getAttribute('href');
          if (hrefAttr && hrefAttr.startsWith('#')) return;
          
          try {
            var url = new URL(link.href);
            var currentParams = new URLSearchParams(window.location.search);
            currentParams.forEach(function(value, key) {
              url.searchParams.set(key, value);
            });
            link.href = url.toString();
          } catch (err) {
            console.error('Erro ao repassar UTMs:', err);
          }
        }
      });
    </script>
  </body>
</html>
